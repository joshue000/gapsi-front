<div class="product-list" *ngIf="!isLoading && products.length > 0">
  <app-product-card *ngFor="let product of products" [product]="product"></app-product-card>
</div>

<div class="product-list" *ngIf="isLoading">
  <div class="skeleton-card" *ngFor="let item of [1,2,3,4,5,6,7,8]"></div>
</div>

<div class="empty-message" *ngIf="!isLoading && products.length === 0">
  <i class="fas fa-box-open"></i>
  <p>No hay productos disponibles</p>
</div>
