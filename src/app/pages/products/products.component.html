<div class="productos-container" *ngIf="state$ | async as state">
  <app-cart></app-cart>
  <div class="products-scroll-container" #scrollContainer>
    <app-error-message *ngIf="state.error" [message]="state.error"></app-error-message>
    <app-product-list *ngIf="!state.error" [products]="state.products" [isLoading]="state.isLoading"></app-product-list>
  </div>
  <footer class="productos-footer">
    <div class="footer-item">
      <i class="fas fa-box"></i>
      <span>{{ state.cartCount }} producto{{ state.cartCount !== 1 ? 's' : '' }}</span>
    </div>
    <div class="footer-item">
      <i class="fas fa-dollar-sign"></i>
      <span>Total: ${{ state.cartTotal | number:'1.2-2' }}</span>
    </div>
  </footer>
</div>
