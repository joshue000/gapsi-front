<div class="productos-container">
  <app-cart></app-cart>
  <div class="products-scroll-container" #scrollContainer>
    <app-error-message *ngIf="error" [message]="error"></app-error-message>
    <app-product-list *ngIf="!error" [products]="products" [isLoading]="isLoading"></app-product-list>
  </div>
  <footer class="productos-footer">
    <div class="footer-item">
      <i class="fas fa-box"></i>
      <span>{{ cartCount }} producto{{ cartCount !== 1 ? 's' : '' }}</span>
    </div>
    <div class="footer-item">
      <i class="fas fa-dollar-sign"></i>
      <span>Total: ${{ cartTotal | number:'1.2-2' }}</span>
    </div>
  </footer>
</div>
